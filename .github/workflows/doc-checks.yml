name: Documentation Validation Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'images/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'images/**'

jobs:
  doc-validation:
    name: Validate Documentation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Documentation Validation
        id: validation
        run: python scripts/validate_docs.py
        continue-on-error: true

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';

            try {
              output = fs.readFileSync('validation_report.md', 'utf8');
            } catch (e) {
              output = 'No validation report generated.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check validation results
        run: |
          if [ -f validation_failed.txt ]; then
            cat validation_failed.txt
            exit 1
          fi

  require-approval:
    name: Require Reviewer Approval
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR has approvals
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const approvals = reviews.filter(review => review.state === 'APPROVED').length;

            if (approvals === 0) {
              core.setFailed('PR requires at least one approval from a reviewer');
            }

      - name: Verify no direct push to main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "::error::Direct push to main branch is not allowed. Please use a PR instead."
          exit 1

  image-validation:
    name: Validate Image Naming
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate image filenames
        run: python scripts/validate_images.py

  placeholder-check:
    name: Check for Unresolved Placeholders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run placeholder validation
        run: python scripts/check_placeholders.py

  asset-validation:
    name: Validate Assets and References
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check asset references
        run: python scripts/validate_assets.py
